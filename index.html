<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F7F5F0;
            --surface: #FFFFFF;
            --text: #1A1A1A;
            --text-secondary: #6B6560;
            --accent: #E63B2E;
            --accent-light: #FFF0EE;
            --green: #1B8C5A;
            --green-light: #EEFBF4;
            --border: #E8E4DE;
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
            --shadow-hover: 0 2px 8px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.06);
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER */
        .hero {
            background: var(--text);
            color: white;
            padding: 48px 24px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 20px,
                rgba(255,255,255,0.015) 20px,
                rgba(255,255,255,0.015) 40px
            );
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 640px;
            margin: 0 auto;
        }

        .logo {
            font-family: 'DM Mono', monospace;
            font-size: 32px;
            font-weight: 500;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .logo .no {
            color: var(--accent);
        }

        .tagline {
            font-size: 15px;
            opacity: 0.55;
            font-weight: 400;
            margin-bottom: 24px;
            letter-spacing: 0.3px;
        }

        .hero-desc {
            font-size: 18px;
            line-height: 1.7;
            font-weight: 500;
            max-width: 500px;
            margin: 0 auto;
            opacity: 0.9;
        }

        .hero-desc span {
            background: var(--accent);
            padding: 1px 8px;
            border-radius: 4px;
            font-weight: 700;
            white-space: nowrap;
        }

        .badge-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 100px;
            border: 1px solid rgba(255,255,255,0.15);
            opacity: 0.6;
            font-weight: 500;
        }

        /* CONTROLS */
        .controls {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 24px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
        }

        .search-box {
            width: 100%;
            padding: 14px 18px 14px 48px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-size: 15px;
            font-family: inherit;
            background: var(--surface);
            transition: border-color 0.2s;
            outline: none;
        }

        .search-box:focus {
            border-color: var(--text);
        }

        .search-wrapper {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.35;
            pointer-events: none;
        }

        .city-tabs {
            display: flex;
            gap: 6px;
            margin-top: 16px;
            overflow-x: auto;
            padding-bottom: 16px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .city-tabs::-webkit-scrollbar {
            display: none;
        }

        .city-tab {
            padding: 8px 16px;
            border-radius: 100px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
            color: var(--text-secondary);
        }

        .city-tab:hover {
            border-color: var(--text);
            color: var(--text);
        }

        .city-tab.active {
            background: var(--text);
            color: white;
            border-color: var(--text);
        }

        .city-tab .count {
            font-weight: 400;
            opacity: 0.5;
            margin-left: 4px;
            font-size: 12px;
        }

        /* LISTING */
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 8px 24px 80px;
        }

        .city-section {
            margin-top: 32px;
        }

        .city-heading {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            padding-left: 4px;
        }

        .listing-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.15s;
            gap: 12px;
        }

        .listing-card:hover {
            border-color: #ccc;
            box-shadow: var(--shadow);
        }

        .listing-info {
            flex: 1;
            min-width: 0;
        }

        .listing-name {
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 2px;
        }

        .listing-area {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .listing-phone {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .phone-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: var(--green-light);
            color: var(--green);
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'DM Mono', monospace;
            text-decoration: none;
            transition: all 0.15s;
            white-space: nowrap;
            border: 1.5px solid transparent;
        }

        .phone-btn:hover {
            background: var(--green);
            color: white;
        }

        .phone-btn svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 64px 24px;
            color: var(--text-secondary);
        }

        .empty-state .emoji {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state p {
            font-size: 15px;
            max-width: 320px;
            margin: 0 auto;
            line-height: 1.7;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 32px 24px 48px;
            font-size: 13px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            max-width: 720px;
            margin: 0 auto;
            line-height: 1.8;
        }

        .footer a {
            color: var(--text);
            font-weight: 600;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .stats {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            opacity: 0.6;
            margin-top: 8px;
        }

        /* ANIMATIONS */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .listing-card {
            animation: fadeUp 0.3s ease both;
        }

        .city-section:nth-child(2) .listing-card { animation-delay: 0.05s; }
        .city-section:nth-child(3) .listing-card { animation-delay: 0.1s; }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .hero { padding: 36px 20px 32px; }
            .logo { font-size: 28px; }
            .hero-desc { font-size: 16px; }
            .controls { padding: 16px 16px 0; }
            .container { padding: 8px 16px 80px; }
            .listing-card { 
                flex-direction: column; 
                align-items: flex-start; 
                gap: 10px;
                padding: 14px 16px;
            }
            .phone-btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="hero-content">
        <div class="logo"><span class="no">no</span>freon.id</div>
        <div class="tagline">est. 2026</div>
        <p class="hero-desc">
            Daftar tukang service AC yang <span>TRUSTED</span> — Ga minta isi freon.
        </p>
        <div class="badge-row">
            <span class="badge">✓ Verified reviews</span>
            <span class="badge">✓ Community-sourced</span>
        </div>
    </div>
</div>

<div class="controls">
    <div class="search-wrapper">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="search-box" id="searchBox" placeholder="Cari nama service atau area...">

    <div class="stats" id="statsLine"></div>
</div>

<script>
// =====================================================
// DATA — Edit this array to add/remove listings
// =====================================================
const DATA = [
    // JABODETABEK
    { name: "Kulmi Indonesia", phone: "0821-2392-6199", area: "Tangerang Selatan & Jakarta Barat", city: "Jabodetabek" },

    // BANDUNG
    { name: "Klinik AC Bandung", phone: "0857-2111-2000", area: "Cigadung, Cibeunying Kaler", city: "Bandung" },

    // SEMARANG

    { name: "Rizqia AC Jogja", phone: "0878-6484-0007", area: "Kotagede, Yogyakarta", city: "Jogja" },
    { name: "Stay Cool", phone: "0813-2595-7722", area: "Wirobrajan & seluruh DIY", city: "Jogja" },

    // SOLO
    { name: "AC Dlidir Solo", phone: "0823-2667-7779", area: "Kadipiro, Solo & sekitarnya", city: "Solo" },
    { name: "Sinar Sejahtera Inti", phone: "0896-5161-5588", area: "Solo, Sukoharjo, Karanganyar", city: "Solo" },
    { name: "Alifia Service AC", phone: "0857-2526-8001", area: "Solo, Sukoharjo, Klaten", city: "Solo" },

    // SURABAYA
    { name: "Surabaya Teknik AC", phone: "0812-3456-7891", area: "Seluruh Surabaya", city: "Surabaya" },
    { name: "Hana Jaya Teknik", phone: "0812-3082-7733", area: "Seluruh Surabaya", city: "Surabaya" },
    { name: "Dokter AC Surabaya", phone: "0857-3088-8877", area: "Surabaya, Sidoarjo, Gresik", city: "Surabaya" },
    { name: "King Service AC Surabaya", phone: "0812-3456-7890", area: "Kenjeran, Surabaya", city: "Surabaya" },

    // BALI
    { name: "Sinar Bintang Teknik", phone: "0812-4638-1744", area: "Denpasar & sekitarnya", city: "Bali" },
    { name: "Centra Teknik", phone: "0896-7530-2145", area: "Denpasar", city: "Bali" },
    { name: "Gunawan Makmur Teknik", phone: "0813-1500-2223", area: "Seluruh Bali", city: "Bali" },
    { name: "CV Astro Bali", phone: "0815-5820-2773", area: "Pemecutan Kelod, Denpasar", city: "Bali" },
];

// =====================================================
// APP LOGIC
// =====================================================
const CITY_ORDER = ["Jabodetabek", "Bandung", "Semarang", "Jogja", "Solo", "Surabaya", "Bali"];
let activeCity = "all";

function getCityCounts() {
    const counts = {};
    DATA.forEach(d => {
        counts[d.city] = (counts[d.city] || 0) + 1;
    });
    return counts;
}

function renderTabs() {
    const counts = getCityCounts();
    const tabs = document.getElementById('cityTabs');
    let html = `<button class="city-tab ${activeCity === 'all' ? 'active' : ''}" data-city="all">Semua<span class="count">${DATA.length}</span></button>`;
    CITY_ORDER.forEach(city => {
        const count = counts[city] || 0;
        if (count > 0) {
            html += `<button class="city-tab ${activeCity === city ? 'active' : ''}" data-city="${city}">${city}<span class="count">${count}</span></button>`;
        }
    });
    tabs.innerHTML = html;
    tabs.querySelectorAll('.city-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            activeCity = tab.dataset.city;
            renderTabs();
            renderListings();
        });
    });
}

function formatPhoneHref(phone) {
    return 'tel:' + phone.replace(/[^0-9+]/g, '');
}

function formatWhatsApp(phone) {
    let num = phone.replace(/[^0-9]/g, '');
    if (num.startsWith('0')) num = '62' + num.slice(1);
    return `https://wa.me/${num}`;
}

function renderListings() {
    const query = document.getElementById('searchBox').value.toLowerCase().trim();
    let filtered = DATA;

    if (activeCity !== 'all') {
        filtered = filtered.filter(d => d.city === activeCity);
    }

    if (query) {
        filtered = filtered.filter(d =>
            d.name.toLowerCase().includes(query) ||
            d.area.toLowerCase().includes(query) ||
            d.city.toLowerCase().includes(query) ||
            d.phone.includes(query)
        );
    }

    const container = document.getElementById('listings');

    if (filtered.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="emoji">🔍</div>
                <p>Belum ada hasil untuk pencarian ini. Coba kata kunci lain atau pilih kota yang berbeda.</p>
            </div>
        `;
        return;
    }

    // Group by city
    const grouped = {};
    filtered.forEach(d => {
        if (!grouped[d.city]) grouped[d.city] = [];
        grouped[d.city].push(d);
    });

    let html = '';
    CITY_ORDER.forEach(city => {
        if (!grouped[city]) return;
        html += `<div class="city-section">`;
        html += `<div class="city-heading">${city}</div>`;
        grouped[city].forEach((item, i) => {
            html += `
                <div class="listing-card" style="animation-delay: ${i * 0.04}s">
                    <div class="listing-info">
                        <div class="listing-name">${item.name}</div>
                        <div class="listing-area">${item.area}</div>
                    </div>
                    <div class="listing-phone">
                        <a class="phone-btn" href="${formatWhatsApp(item.phone)}" target="_blank" title="WhatsApp ${item.phone}">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                            ${item.phone}
                        </a>
                    </div>
                </div>
            `;
        });
        html += `</div>`;
    });

    container.innerHTML = html;
}

// Stats
document.getElementById('statsLine').textContent = `${DATA.length} tukang AC · ${CITY_ORDER.length} kota · updated 2026`;

// Init
renderTabs();
renderListings();

// Search
document.getElementById('searchBox').addEventListener('input', () => {
    renderListings();
});
</script>

</body>
</html>
